<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>دعم ذوي الاحتياجات الخاصة</title>

<style>
:root {
    --main: #0077b6;
    --bg: #f4f4f4;
    --text: #222;
}

body {
    margin: 0;
    font-family: 'Cairo', Arial;
    background: var(--bg);
    color: var(--text);
    direction: rtl;
    transition: 0.3s;
}

.dark {
    --bg: #121212;
    --text: #fff;
}

.high-contrast {
    background: black !important;
    color: yellow !important;
}

header {
    background: linear-gradient(135deg, #0077b6, #00b4d8);
    color: white;
    padding: 30px;
    text-align: center;
}

nav {
    text-align: center;
    padding: 10px;
}

button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    background: var(--main);
    color: white;
    cursor: pointer;
}

.container {
    padding: 20px;
}

/* Grid احترافي */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.dark .card {
    background: #1e1e1e;
}

.large-text {
    font-size: 20px;
}

iframe {
    width: 100%;
    height: 300px;
    border-radius: 15px;
    border: none;
}
</style>

</head>

<body>

<header>
    <h1>💙 دعم ذوي الاحتياجات الخاصة</h1>
    <p>خدمات ومساعدة في مكان واحد</p>
</header>

<nav>
    <button onclick="toggleDark()">🌙 وضع ليلي</button>
    <button onclick="toggleContrast()">⚫ تباين</button>
    <button onclick="increaseText()">🔍 تكبير</button>
    <button onclick="speak()">🔊 قراءة</button>
</nav>

<div class="container">

    <div class="grid">

        <div class="card">
            <h2>📌 من نحن</h2>
            <p>موقع لدعم ذوي الاحتياجات الخاصة وتوفير الخدمات والمعلومات.</p>
        </div>

        <div class="card">
            <h2>🛠️ خدماتنا</h2>
            <p>✔ مراكز تأهيل<br>✔ دعم نفسي<br>✔ أدوات مساعدة</p>
        </div>

        <div class="card">
            <h2>📞 تواصل</h2>
            <p>01000000000<br>help@example.com</p>
        </div>

    </div>

    <div class="card">
        <h2>🗺️ أماكن المراكز</h2>

        <!-- خريطة Google -->
        <iframe src="https://www.google.com/maps?q=rehabilitation+center+Egypt&output=embed"></iframe>

    </div>

</div>

<script>
function toggleDark() {
    document.body.classList.toggle("dark");
}

function toggleContrast() {
    document.body.classList.toggle("high-contrast");
}

function increaseText() {
    document.body.classList.toggle("large-text");
}

function speak() {
    let speech = new SpeechSynthesisUtterance(document.body.innerText);
    speech.lang = "ar";
    window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>
