<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة سند - لدعم ذوي الهمم</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="loginModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-content">
            <button class="close" onclick="closeLogin()" aria-label="إغلاق النافذة">×</button>
            <div class="login-header">
                <i class="fas fa-user-circle fa-3x" aria-hidden="true"></i>
                <h2 id="modalTitle">تسجيل الدخول</h2>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <label for="loginEmail" class="visually-hidden">البريد الإلكتروني</label>
                    <i class="fas fa-envelope" aria-hidden="true"></i>
                    <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" required>
                </div>
                <div class="input-group password-group">
                    <label for="loginPass" class="visually-hidden">كلمة المرور</label>
                    <i class="fas fa-lock" aria-hidden="true"></i>
                    <input type="password" id="loginPass" placeholder="كلمة المرور" required>
                    <button type="button" id="togglePassword" aria-label="إظهار كلمة المرور">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
                <div class="remember-me">
                    <input type="checkbox" id="remember">
                    <label for="remember">تذكرني على هذا الجهاز</label>
                </div>
                <div id="loginError" class="error-msg" aria-live="assertive"></div>
                <button type="submit" class="btn-login">دخول</button>
            </form>
        </div>
    </div>

    <header>
        <div class="header-overlay">
            <h1>💙 منصة سند</h1>
            <p>نحن معك، خطوة بخطوة نحو مستقبل أفضل</p>
        </div>
    </header>

    <nav aria-label="أدوات الوصول">
        <div class="nav-tools">
            <button onclick="toggleDark()" aria-label="تفعيل الوضع الليلي" title="وضع ليلي"><i class="fas fa-moon"></i></button>
            <button onclick="toggleContrast()" aria-label="تفعيل التباين العالي" title="تباين عالي"><i class="fas fa-adjust"></i></button>
            <button onclick="increaseText()" aria-label="تكبير حجم الخط" title="تكبير الخط"><i class="fas fa-search-plus"></i></button>
            <button onclick="speak()" aria-label="قراءة محتوى الموقع بصوت مسموع" title="قراءة الموقع"><i class="fas fa-volume-up"></i></button>
        </div>
        <button class="login-trigger" onclick="openLogin()">دخول <i class="fas fa-sign-in-alt"></i></button>
    </nav>

    <main class="container" id="mainContent">
        <section class="card animate-on-scroll">
            <h2><i class="fas fa-search" aria-hidden="true"></i> ابحث عن خدمة</h2>
            <label for="serviceSearch" class="visually-hidden">ابحث في الخدمات المتاحة</label>
            <input type="text" id="serviceSearch" onkeyup="filterServices()" placeholder="ابحث هنا...">
            <div class="services-container">
                <div class="service-item"><i class="fas fa-wheelchair" aria-hidden="true"></i><h3>أدوات مساعدة</h3></div>
                <div class="service-item"><i class="fas fa-user-md" aria-hidden="true"></i><h3>استشارات</h3></div>
                <div class="service-item"><i class="fas fa-hands-helping" aria-hidden="true"></i><h3>دعم نفسي</h3></div>
            </div>
        </section>

        </main>

    <footer>
        <p>جميع الحقوق محفوظة © 2026 - منصة سند</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
