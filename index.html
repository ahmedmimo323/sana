<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>منصة تعليمية</title>

<style>
:root {
    --main-color: #0077b6;
    --bg: #f4f4f4;
    --text: #222;
}

body {
    margin: 0;
    font-family: 'Cairo', Arial;
    background: var(--bg);
    color: var(--text);
    direction: rtl;
}

.dark-mode {
    --bg: #121212;
    --text: #fff;
}

header {
    background: linear-gradient(135deg, #0077b6, #00b4d8);
    color: white;
    padding: 30px;
    text-align: center;
}

nav {
    text-align: center;
    padding: 10px;
}

button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    background: var(--main-color);
    color: white;
    cursor: pointer;
}

.container {
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    margin: 15px 0;
    border-radius: 15px;
}

.dark-mode .card {
    background: #1e1e1e;
}

/* Login */
#loginBox {
    max-width: 300px;
    margin: auto;
    text-align: center;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
}

/* Hidden */
.hidden {
    display: none;
}

iframe {
    width: 100%;
    height: 250px;
    border-radius: 10px;
}
</style>

</head>

<body>

<header>
    <h1>🎓 منصة تعليمية</h1>
    <p>تعلم بسهولة</p>
</header>

<nav>
    <button onclick="toggleDark()">🌙 الوضع الليلي</button>
    <button onclick="logout()">🚪 تسجيل خروج</button>
</nav>

<!-- 🔐 Login -->
<div id="loginBox">
    <h2>تسجيل الدخول</h2>
    <input type="text" id="username" placeholder="اسم المستخدم">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button onclick="login()">دخول</button>
</div>

<!-- 🎓 Content -->
<div id="content" class="container hidden">

    <div class="card">
        <h2>مرحباً بك 👋</h2>
        <p>تم تسجيل الدخول بنجاح</p>
    </div>

    <div class="card">
        <h2>🎥 فيديو تعليمي</h2>
        <iframe src="https://www.youtube.com/embed/3JluqTojuME" allowfullscreen></iframe>
    </div>

    <div class="card">
        <h2>🎥 فيديو آخر</h2>
        <iframe src="https://www.youtube.com/embed/Z1Yd7upQsXY" allowfullscreen></iframe>
    </div>

</div>

<script>
// 🌙 Dark Mode
function toggleDark() {
    document.body.classList.toggle("dark-mode");
}

// 🔐 Login system
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if (user === "admin" && pass === "1234") {
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("content").classList.remove("hidden");
        localStorage.setItem("loggedIn", "true");
    } else {
        alert("بيانات غير صحيحة ❌");
    }
}

// 🚪 Logout
function logout() {
    localStorage.removeItem("loggedIn");
    location.reload();
}

// 🔁 حفظ تسجيل الدخول
window.onload = function() {
    if (localStorage.getItem("loggedIn") === "true") {
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("content").classList.remove("hidden");
    }
};
</script>

</body>
</html>
