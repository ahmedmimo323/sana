<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعم ذوي الاحتياجات الخاصة</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
    <h1><i class="fas fa-wheelchair"></i> دعم ذوي الاحتياجات الخاصة</h1>
    <p>بوابتكم للوصول إلى الخدمات والتمكين</p>
</header>

<nav aria-label="أدوات الوصول">
    <button onclick="toggleDark()"><i class="fas fa-moon"></i> وضع ليلي</button>
    <button onclick="toggleContrast()"><i class="fas fa-adjust"></i> تباين</button>
    <button onclick="increaseText()"><i class="fas fa-search-plus"></i> تكبير</button>
    <button onclick="speak()"><i class="fas fa-volume-up"></i> قراءة</button>
</nav>

<main class="container">
    <div class="grid">
        <section class="card">
            <h2><i class="fas fa-info-circle"></i> من نحن</h2>
            <p>منصة رقمية تهدف لتسهيل وصول ذوي الهمم إلى المعلومات والمرافق والخدمات المتخصصة في مكان واحد.</p>
        </section>

        <section class="card">
            <h2><i class="fas fa-concierge-bell"></i> خدماتنا</h2>
            <p>✔ مراكز تأهيل معتمدة<br>✔ استشارات دعم نفسي<br>✔ توفير أدوات مساعدة وتقنيات ذكية</p>
        </section>

        <section class="card">
            <h2><i class="fas fa-headset"></i> تواصل معنا</h2>
            <p><b>الهاتف:</b> 01000000000<br><b>البريد:</b> help@example.com</p>
        </section>
    </div>

    <section class="card form-section">
        <h2><i class="fas fa-envelope"></i> أرسل لنا استفسارك</h2>
        <form id="contactForm">
            <input type="text" placeholder="الاسم الكامل" required>
            <textarea placeholder="كيف يمكننا مساعدتك؟" required></textarea>
            <button type="submit">إرسال الطلب الآن</button>
        </form>
    </section>

    <section class="card">
        <h2><i class="fas fa-map-marker-alt"></i> خريطة المراكز المتاحة</h2>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3451.123456789!2d31.2357!3d30.0444!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzDCsDAyJzQwLjAiTiAzMcKwMTQnMDguNSJF!5e0!3m2!1sar!2seg!4v1625000000000"></iframe>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>